<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { margin-top: 50px; color: #00ff88; text-shadow: 0 0 10px #00ff88; }

        /* THE FIX: Changed to flex and added scrolling */
        .game-container {
            display: flex;
            flex-direction: row; /* Forces them into a row */
            overflow-x: auto;    /* Adds a scrollbar if there are too many games */
            padding: 20px;
            gap: 25px;
            width: 90%;
            justify-content: flex-start; /* Aligns them to the left */
        }

        /* Styling for the scrollbar to keep it dark */
        .game-container::-webkit-scrollbar { height: 8px; }
        .game-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .game-card {
            flex: 0 0 200px; /* Keeps each card at exactly 200px wide */
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #00ff88;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }

        .game-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .game-card p { margin: 10px 0 0; font-weight: bold; }
    </style>
</head>
<body>
