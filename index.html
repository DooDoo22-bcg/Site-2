<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title> <style>
        /* CSS: Makes the site look like a pro game hub */
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { margin-top: 50px; color: #00ff88; text-shadow: 0 0 10px #00ff88; }

        .game-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            width: 80%;
            margin-top: 40px;
        }

        .game-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #00ff88;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }

        .game-card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .game-card p { margin: 10px 0 0; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Game Portal</h1>
    <p>Select a game to open in an about:blank tab.</p>

   <div class="game-card" onclick="openGame('https://html-classic.itch.zone/html/15451330/index.html')">
    <img src="polytrack-min.png" alt="PolyTrack">
    <p>PolyTrack</p>
</div>
       

    <script>
        // JAVASCRIPT: The About:Blank Logic
        function openGame(url) {
            var win = window.open();
            if (!win) {
                alert("Pop-up blocked! Please allow pop-ups for this site to work.");
                return;
            }
            
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.margin = '0';
            iframe.src = url;
            
            win.document.body.appendChild(iframe);
        }

        // PANIC BUTTON: Press 'Escape' to go to Google
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                window.location.replace('https://google.com');
            }
        });
    </script>
</body>
</html>
