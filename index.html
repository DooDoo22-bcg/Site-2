<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site 2</title>
    <style>
        /* Base Styles */
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 30px;
        }

        /* Horizontal Row Setup */
        .game-container {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap; /* Keeps them in one single line */
            overflow-x: auto;   /* Allows side-to-side scrolling */
            gap: 20px;
            width: 95%;
            padding: 20px 10px;
            /* Smooth scrolling for touchscreens/trackpads */
            -webkit-overflow-scrolling: touch;
        }

        /* Custom Scrollbar (so it looks good on dark mode) */
        .game-container::-webkit-scrollbar {
            height: 8px;
        }
        .game-container::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }

        /* Game Card Styles */
        .game-card {
            flex: 0 0 200px; /* Each card is exactly 200px wide */
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
        }

        .game-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
        }

        .game-card p {
            margin-top: 10px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Game Portal</h1>

    <div class="game-container">
        
        <div class="game-card" onclick="openGame('https://topvaz.github.io/g/polytrack/')">
            <img src="https://raw.githubusercontent.com/skid-inc/polytrack/main/img/logo.png" alt="PolyTrack">
            <p>PolyTrack</p>
        </div>

        <div class="game-card" onclick="openGame('https://topvaz.github.io/g/slope/')">
            <img src="https://raw.githubusercontent.com/topvaz/topvaz.github.io/master/slope/slope.png" alt="Slope">
            <p>Slope</p>
        </div>

        <div class="game-card" onclick="openGame('https://play2048.co')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/18/2048_logo.svg" alt="2048">
            <p>2048</p>
        </div>

    </div>

    <script>
        function openGame(url) {
            var win = window.open();
            if (!win) {
                alert("Please allow pop-ups for this site!");
                return;
            }
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }
    </script>
</body>
</html>
