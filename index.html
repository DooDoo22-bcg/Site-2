<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site 2</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #00ff88; margin-bottom: 30px; }
        .game-container { display: flex; flex-direction: row; flex-wrap: nowrap; overflow-x: auto; gap: 20px; width: 95%; padding: 20px 10px; -webkit-overflow-scrolling: touch; }
        .game-container::-webkit-scrollbar { height: 8px; }
        .game-container::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        .game-card { flex: 0 0 200px; background: #1a1a1a; border: 2px solid #333; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
        .game-card:hover { transform: translateY(-5px); border-color: #00ff88; }
        .game-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; }
        .game-card p { margin-top: 10px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <h1>Game Portal</h1>

    <div class="game-container">
        <div class="game-card" onclick="openGame('https://topvaz.github.io/g/polytrack/')">
            <img src="polytrack-min.png" alt="PolyTrack">
            <p>PolyTrack</p>
        </div>

        <div class="game-card" onclick="openGame('https://topvaz.github.io/g/slope/')">
            <img src="slope.png" alt="Slope">
            <p>Slope</p>
        </div>

        <div class="game-card" onclick="openGame('https://gitbubbls.github.io/2048/')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/18/2048_logo.svg" alt="2048">
            <p>2048</p>
        </div>
    </div>

  <script>
    function openGame(url) {
        // Open the window
        var win = window.open('about:blank', '_blank');
        
        if (!win) {
            alert("Pop-up blocked! Please allow pop-ups.");
            return;
        }

        // Force the window to have no "Base URL" so it doesn't look at your GitHub
        win.document.open();
        
        var html = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Google Classroom</title>
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
                    iframe { width: 100%; height: 100%; border: none; }
                </style>
            </head>
            <body>
                <iframe src="${url}" allowfullscreen></iframe>
            </body>
            </html>
        `;

        win.document.write(html);
        win.document.close();
    }
</script>
</body>
</html>
